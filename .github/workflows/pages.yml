name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [private-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout posts submodule (private)
        env:
          PRIVATE_DEPLOY_KEY: ${{ secrets.PRIVATE_DEPLOY_KEY }}
        run: |
          if [ -z "$PRIVATE_DEPLOY_KEY" ]; then
            echo "PRIVATE_DEPLOY_KEY not configured — creating placeholder post."
            mkdir -p posts/engineering
            printf '%s\n' '# Welcome' '' 'This blog is under construction.' > posts/engineering/welcome.md
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$PRIVATE_DEPLOY_KEY" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/private_key" git submodule update --init posts

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
